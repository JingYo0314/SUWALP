<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVA管理系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        /* 表單區塊樣式 (加入編輯模式切換效果) */
        .form-section {
            background-color: #f9fbfd; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .form-section.edit-mode {
            background-color: #fffbeb; border-color: #fcd34d; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }
        #formTitle { color: #2c3e50; font-size: 18px; margin-top: 0; border-left: 4px solid #3498db; padding-left: 10px; }
        .edit-mode #formTitle { border-left-color: #f59e0b; color: #b45309; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #4a5568; }
        .form-group input, .form-group select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; outline: none; margin-bottom: 5px; }
        .form-group input:focus, .form-group select:focus { border-color: #3498db; }
        .custom-input { display: none; background-color: #f1f5f9; } /* 隱藏的自訂輸入框 */
        
        .search-section { display: flex; align-items: center; margin: 20px 0; gap: 10px; background-color: #edf2f7; padding: 15px; border-radius: 6px; }
        .search-input { flex: 1; padding: 10px 15px; font-size: 15px; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; }
        
        /* 按鈕樣式 */
        .btn { padding: 10px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        
        /* 儲存區按鈕組合 */
        .form-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-submit { background-color: #2ecc71; color: white; flex: 1; padding: 12px; font-size: 16px; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-submit.edit-active { background-color: #f59e0b; }
        .btn-submit.edit-active:hover { background-color: #d97706; }
        .btn-cancel { background-color: #64748b; color: white; padding: 12px; font-size: 16px; display: none; }
        .btn-cancel:hover { background-color: #475569; }
        
        /* 表格按鈕 */
        .btn-sm { padding: 5px 10px; font-size: 12px; margin-right: 4px; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; color: white; }
        .btn-edit:hover { background-color: #d35400; }

        /* 表格與排序 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f8fafc; }
        .sortable { cursor: pointer; user-select: none; transition: 0.2s; }
        .sortable:hover { background-color: #34495e; }
        .sort-icon { font-size: 12px; margin-left: 5px; opacity: 0.5; }
        .sort-active { opacity: 1; color: #f1c40f; }

        .no-data { text-align: center; padding: 30px; color: #94a3b8; font-size: 16px; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .status-done { background-color: #def7ec; color: #03543f; }
        .status-wait { background-color: #fef3c7; color: #92400e; }
        
        /* 底部統計資訊樣式 */
        .footer-stats { text-align: center; margin-top: 30px; font-size: 13px; color: #7f8c8d; padding-top: 15px; border-top: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 TVA管理系統</h1>
    
    <!-- 1. 新增/編輯資料表單 -->
    <div id="formSection" class="form-section">
        <h2 id="formTitle">➕ 新增維修/校正紀錄</h2>
        <form id="recordForm" onsubmit="handleFormSubmit(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="inputDate">日期</label>
                    <input type="date" id="inputDate" required>
                </div>
                <div class="form-group">
                    <label for="inputCustomer">客戶名稱</label>
                    <!-- 加入 list 屬性與 datalist 標籤來實現歷史建議功能 -->
                    <input type="text" id="inputCustomer" placeholder="例如：台積電" list="customerList" required>
                    <datalist id="customerList"></datalist>
                </div>
                <div class="form-group">
                    <label for="inputSerial">儀器序號</label>
                    <!-- 加入 list 屬性與 datalist 標籤來實現歷史建議功能 -->
                    <input type="text" id="inputSerial" placeholder="例如：SN-A1001" list="serialList" required>
                    <datalist id="serialList"></datalist>
                </div>
            </div>
            <div class="form-grid">
                <!-- 任務選單 -->
                <div class="form-group" style="grid-column: span 2;">
                    <label for="inputTask">維修/校正項目詳細說明</label>
                    <select id="inputTask" onchange="toggleCustomInput('inputTask', 'customTask')" required>
                        <option value="" disabled selected>請選擇項目...</option>
                        <option value="校正">1. 校正</option>
                        <option value="吸到水">2. 吸到水</option>
                        <option value="更換電池">3. 更換電池</option>
                        <option value="更換泵浦總成">4. 更換泵浦總成</option>
                        <option value="更換點火器">5. 更換點火器</option>
                        <option value="韌體更新">6. 韌體更新</option>
                        <option value="新機出貨">7. 新機出貨</option>
                        <option value="其他">8. 其他 (自行輸入)</option>
                    </select>
                    <input type="text" id="customTask" class="custom-input" placeholder="請手動輸入維修/校正項目...">
                </div>
                <!-- 工程師選單 -->
                <div class="form-group">
                    <label for="inputEngineer">處理工程師</label>
                    <select id="inputEngineer" onchange="toggleCustomInput('inputEngineer', 'customEngineer')" required>
                        <option value="" disabled selected>請選擇工程師...</option>
                        <option value="Gary">1. Gary</option>
                        <option value="Krain">2. Krain</option>
                        <option value="其他">3. 其他 (自行輸入)</option>
                    </select>
                    <input type="text" id="customEngineer" class="custom-input" placeholder="請手動輸入工程師姓名...">
                </div>
                <div class="form-group">
                    <label for="inputStatus">案件狀態</label>
                    <select id="inputStatus">
                        <option value="✅ 完成">✅ 完成</option>
                        <option value="⏳ 待零件">⏳ 待零件</option>
                        <option value="⚠️ 檢修中">⚠️ 檢修中</option>
                    </select>
                </div>
            </div>
            <div class="form-grid" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label for="inputRemarks">備註</label>
                    <input type="text" id="inputRemarks" placeholder="選填備註事項...">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn btn-submit">儲存並同步至雲端</button>
                <button type="button" id="cancelEditBtn" class="btn btn-cancel" onclick="resetFormState()">取消編輯</button>
            </div>
        </form>
    </div>

    <!-- 2. 搜尋區塊 -->
    <div class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="輸入「客戶名稱」或「儀器序號」進行搜尋..." oninput="searchRecords()">
        <button class="btn btn-primary" onclick="searchRecords()">🔍 搜尋</button>
        <button class="btn btn-secondary" onclick="resetSearch()">清除搜尋</button>
    </div>

    <!-- 3. 資料表格 -->
    <table>
        <thead>
            <tr>
                <th class="sortable" onclick="handleSort('date')">日期 <span id="sort-date" class="sort-icon sort-active">⬇️</span></th>
                <th class="sortable" onclick="handleSort('customer')">客戶名稱 <span id="sort-customer" class="sort-icon">↕️</span></th>
                <th class="sortable" onclick="handleSort('serial')">儀器序號 <span id="sort-serial" class="sort-icon">↕️</span></th>
                <th>維修/校正項目</th>
                <th>處理工程師</th>
                <th>狀態</th>
                <th>備註</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="recordTableBody">
            <tr><td colspan="8" class="no-data">☁️ 雲端資料庫連線中...</td></tr>
        </tbody>
    </table>

    <!-- 4. 底部系統統計 -->
    <div id="statsFooter" class="footer-stats">
        目前此系統累積有 0 間客戶，0 台儀器
    </div>
</div>

<!-- 引入 Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 ⚠️ 記得將這裡替換成你專屬的 Firebase 金鑰 ⚠️ 🔴
    const firebaseConfig = {
        apiKey: "AIzaSyBccKaB3yjh7anO2KhK2XsPiwnoEDYAss8",
  authDomain: "tva2020.firebaseapp.com",
  databaseURL: "https://tva2020-default-rtdb.firebaseio.com",
  projectId: "tva2020",
  storageBucket: "tva2020.firebasestorage.app",
  messagingSenderId: "309634484442",
  appId: "1:309634484442:web:d31941cfef811f73a63de3",
  measurementId: "G-ZSCF0Y3N5Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const recordsCol = collection(db, "instrument_records"); 

    let database = []; 
    let currentEditingId = null; 

    const tableBody = document.getElementById("recordTableBody");
    const searchInput = document.getElementById("searchInput");

    let currentSortColumn = 'date';
    let isDescending = true;

    // 實時監聽雲端資料
    onSnapshot(recordsCol, (snapshot) => {
        database = [];
        snapshot.forEach((doc) => {
            database.push({ id: doc.id, ...doc.data() });
        });
        searchRecords(); 
        updateStats(); // 更新底部統計數字
        updateDatalists(); // 更新輸入框的自動提示選單
    }, (error) => {
        console.error("資料讀取失敗: ", error);
        tableBody.innerHTML = `<tr><td colspan="8" class="no-data" style="color:red;">❌ 無法連線至雲端，請檢查設定。</td></tr>`;
    });

    // 💡 新增：自動產生客戶名稱與儀器序號的提示清單
    function updateDatalists() {
        const customerList = document.getElementById("customerList");
        const serialList = document.getElementById("serialList");
        
        // 過濾出不重複的歷史紀錄
        const uniqueCustomers = [...new Set(database.map(record => record.customer))].filter(Boolean);
        const uniqueSerials = [...new Set(database.map(record => record.serial))].filter(Boolean);
        
        // 將這些歷史紀錄塞入 datalist 當中作為提示選項
        customerList.innerHTML = uniqueCustomers.map(c => `<option value="${c}">`).join("");
        serialList.innerHTML = uniqueSerials.map(s => `<option value="${s}">`).join("");
    }

    // 更新底部統計資訊功能
    function updateStats() {
        const uniqueCustomers = new Set(database.map(record => record.customer)).size;
        const uniqueSerials = new Set(database.map(record => record.serial)).size;
        
        const statsElement = document.getElementById("statsFooter");
        if (statsElement) {
            statsElement.innerText = `目前此系統累積有 ${uniqueCustomers} 間客戶，${uniqueSerials} 台儀器`;
        }
    }

    // 表單初始載入今天日期
    function initFormDate() {
        if (currentEditingId) return; 
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById("inputDate").value = `${year}-${month}-${day}`;
    }

    // 控制「其他(自行輸入)」的隱藏與顯示
    function toggleCustomInput(selectId, customInputId) {
        const selectBox = document.getElementById(selectId);
        const customInput = document.getElementById(customInputId);
        if (selectBox.value === "其他") {
            customInput.style.display = "block";
            customInput.setAttribute("required", "true"); 
        } else {
            customInput.style.display = "none";
            customInput.removeAttribute("required");
            customInput.value = ""; 
        }
    }

    // 表格排序邏輯
    function handleSort(column) {
        if (currentSortColumn === column) {
            isDescending = !isDescending;
        } else {
            currentSortColumn = column;
            isDescending = (column === 'date') ? true : false;
        }
        updateSortIcons();
        searchRecords();
    }

    function updateSortIcons() {
        ['date', 'customer', 'serial'].forEach(id => {
            const el = document.getElementById(`sort-${id}`);
            if (id === currentSortColumn) {
                el.innerText = isDescending ? "⬇️" : "⬆️";
                el.classList.add("sort-active");
            } else {
                el.innerText = "↕️";
                el.classList.remove("sort-active");
            }
        });
    }

    function applySort(dataArray) {
        return dataArray.sort((a, b) => {
            let valA = a[currentSortColumn] || "";
            let valB = b[currentSortColumn] || "";
            if (valA < valB) return isDescending ? 1 : -1;
            if (valA > valB) return isDescending ? -1 : 1;
            return 0;
        });
    }

    // 渲染表格內容
    function renderTable(data) {
        tableBody.innerHTML = "";
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="no-data">📭 目前沒有符合條件的紀錄</td></tr>`;
            return;
        }
        const sortedData = applySort(data);
        sortedData.forEach(record => {
            const statusClass = record.status.includes("完成") ? "status-done" : "status-wait";
            const row = `<tr>
                <td><strong>${record.date}</strong></td>
                <td><strong>${record.customer}</strong></td>
                <td><code>${record.serial}</code></td>
                <td>${record.task}</td>
                <td>${record.engineer}</td>
                <td><span class="status-badge ${statusClass}">${record.status}</span></td>
                <td><span style="color:#555; font-size:13px;">${record.remarks || ""}</span></td>
                <td>
                    <button class="btn btn-sm btn-edit" onclick="editRecord('${record.id}')">編輯</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRecord('${record.id}')">刪除</button>
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // 點擊表格的「編輯」按鈕觸發
    function editRecord(id) {
        const record = database.find(r => r.id === id);
        if (!record) return;

        currentEditingId = id; 
        
        document.getElementById("formSection").classList.add("edit-mode");
        document.getElementById("formTitle").innerText = "✏️ 編輯維修/校正紀錄";
        document.getElementById("submitBtn").innerText = "💾 更新並同步至雲端";
        document.getElementById("submitBtn").classList.add("edit-active");
        document.getElementById("cancelEditBtn").style.display = "block";

        document.getElementById("inputDate").value = record.date;
        document.getElementById("inputCustomer").value = record.customer;
        document.getElementById("inputSerial").value = record.serial;
        document.getElementById("inputStatus").value = record.status;
        document.getElementById("inputRemarks").value = record.remarks || "";

        const taskSelect = document.getElementById("inputTask");
        const customTaskInput = document.getElementById("customTask");
        const taskOptions = Array.from(taskSelect.options).map(opt => opt.value);
        if (taskOptions.includes(record.task)) {
            taskSelect.value = record.task;
            customTaskInput.style.display = "none";
        } else {
            taskSelect.value = "其他";
            customTaskInput.style.display = "block";
            customTaskInput.value = record.task; 
        }

        const engSelect = document.getElementById("inputEngineer");
        const customEngInput = document.getElementById("customEngineer");
        const engOptions = Array.from(engSelect.options).map(opt => opt.value);
        if (engOptions.includes(record.engineer)) {
            engSelect.value = record.engineer;
            customEngInput.style.display = "none";
        } else {
            engSelect.value = "其他";
            customEngInput.style.display = "block";
            customEngInput.value = record.engineer;
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 重置表單狀態 
    function resetFormState() {
        currentEditingId = null;
        document.getElementById("recordForm").reset();
        
        document.getElementById("formSection").classList.remove("edit-mode");
        document.getElementById("formTitle").innerText = "➕ 新增維修/校正紀錄";
        document.getElementById("submitBtn").innerText = "儲存並同步至雲端";
        document.getElementById("submitBtn").classList.remove("edit-active");
        document.getElementById("cancelEditBtn").style.display = "none";

        document.getElementById("customTask").style.display = "none";
        document.getElementById("customEngineer").style.display = "none";

        initFormDate(); 
    }

    // 處理表單送出
    async function handleFormSubmit(event) {
        event.preventDefault();

        let finalTask = document.getElementById("inputTask").value;
        if (finalTask === "其他") finalTask = document.getElementById("customTask").value.trim();

        let finalEngineer = document.getElementById("inputEngineer").value;
        if (finalEngineer === "其他") finalEngineer = document.getElementById("customEngineer").value.trim();

        const recordData = {
            date: document.getElementById("inputDate").value,
            customer: document.getElementById("inputCustomer").value.trim(),
            serial: document.getElementById("inputSerial").value.trim(),
            task: finalTask,
            engineer: finalEngineer,
            status: document.getElementById("inputStatus").value,
            remarks: document.getElementById("inputRemarks").value.trim()
        };

        try {
            if (currentEditingId) {
                await updateDoc(doc(db, "instrument_records", currentEditingId), recordData);
                alert("✅ 紀錄更新成功！");
            } else {
                await addDoc(recordsCol, recordData); 
                alert("🎉 資料已成功同步至雲端！");
            }
            resetFormState(); 
        } catch (e) {
            alert("❌ 儲存失敗，請檢查網路狀態：" + e);
        }
    }

    // 從 Firebase 刪除紀錄
    async function deleteRecord(id) {
        if (confirm("⚠️ 確定要刪除這筆紀錄嗎？確認後無法復原。")) {
            try {
                await deleteDoc(doc(db, "instrument_records", id));
            } catch (e) {
                alert("❌ 刪除失敗：" + e);
            }
        }
    }

    // 搜尋功能
    function searchRecords() {
        const keyword = searchInput.value.trim().toLowerCase();
        let displayData = database;
        if (keyword !== "") {
            displayData = database.filter(record => 
                (record.customer && record.customer.toLowerCase().includes(keyword)) || 
                (record.serial && record.serial.toLowerCase().includes(keyword))
            );
        }
        renderTable(displayData);
    }

    function resetSearch() {
        searchInput.value = "";
        searchRecords();
    }

    // 綁定全域函式供 HTML onclick 使用
    window.handleFormSubmit = handleFormSubmit;
    window.deleteRecord = deleteRecord;
    window.editRecord = editRecord;
    window.resetFormState = resetFormState;
    window.handleSort = handleSort;
    window.searchRecords = searchRecords;
    window.resetSearch = resetSearch;
    window.toggleCustomInput = toggleCustomInput;

    // 初始化
    initFormDate();
</script>
</body>
</html>
