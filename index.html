<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVA管理系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 標題與頂部導覽 */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; color: #2c3e50; cursor: pointer; transition: color 0.3s; font-size: 28px; }
        h1:hover { color: #3498db; }
        .user-controls { display: flex; gap: 10px; align-items: center; }
        .welcome-text { font-weight: bold; color: #7f8c8d; }
        
        /* 登入畫面樣式 */
        #loginSection { max-width: 400px; margin: 100px auto; text-align: center; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #loginSection h2 { color: #2c3e50; margin-top: 0; margin-bottom: 20px; }
        #loginSection input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        /* 表單區塊樣式 */
        .form-section { background-color: #f9fbfd; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; margin-bottom: 30px; transition: all 0.3s ease; }
        .form-section.edit-mode { background-color: #fffbeb; border-color: #fcd34d; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        #formTitle { color: #2c3e50; font-size: 18px; margin-top: 0; border-left: 4px solid #3498db; padding-left: 10px; }
        .edit-mode #formTitle { border-left-color: #f59e0b; color: #b45309; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #4a5568; }
        .form-group input, .form-group select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; outline: none; margin-bottom: 5px; }
        .form-group input:focus, .form-group select:focus { border-color: #3498db; }
        .custom-input { display: none; background-color: #f1f5f9; } 
        
        .search-section { display: flex; align-items: center; margin: 20px 0; gap: 10px; background-color: #edf2f7; padding: 15px; border-radius: 6px; }
        .search-input { flex: 1; padding: 10px 15px; font-size: 15px; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; }
        
        /* 按鈕樣式 */
        .btn { padding: 10px 20px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        
        .form-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-submit { background-color: #2ecc71; color: white; flex: 1; padding: 12px; font-size: 16px; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-submit.edit-active { background-color: #f59e0b; }
        .btn-submit.edit-active:hover { background-color: #d97706; }
        .btn-cancel { background-color: #64748b; color: white; padding: 12px; font-size: 16px; display: none; }
        .btn-cancel:hover { background-color: #475569; }
        
        .btn-sm { padding: 5px 10px; font-size: 12px; margin-right: 4px; margin-bottom: 4px; display: inline-block;}
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; color: white; }
        .btn-edit:hover { background-color: #d35400; }
        .btn-info { background-color: #8e44ad; color: white; }
        .btn-info:hover { background-color: #732d91; }

        /* 表格與排序 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f8fafc; }
        .sortable { cursor: pointer; user-select: none; transition: 0.2s; }
        .sortable:hover { background-color: #34495e; }
        .sort-icon { font-size: 12px; margin-left: 5px; opacity: 0.5; }
        .sort-active { opacity: 1; color: #f1c40f; }
        .no-data { text-align: center; padding: 30px; color: #94a3b8; font-size: 16px; }
        
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; white-space: nowrap; display: inline-block; }
        .status-done { background-color: #def7ec; color: #03543f; }
        .status-wait { background-color: #fef3c7; color: #92400e; }
        
        /* 分頁按鈕 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; }
        .page-btn { padding: 8px 12px; border: 1px solid #cbd5e1; background-color: #fff; border-radius: 4px; cursor: pointer; color: #333; font-weight: bold; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background-color: #f1f5f9; }
        .page-btn.active { background-color: #3498db; color: white; border-color: #3498db; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-stats { text-align: center; margin-top: 20px; font-size: 13px; color: #7f8c8d; padding-top: 15px; border-top: 1px dashed #cbd5e1; }
        
        /* 隱藏區塊 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginSection">
    <h2>🔒 系統登入</h2>
    <form onsubmit="handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="請輸入帳號" required>
        <input type="password" id="loginPassword" placeholder="請輸入密碼" required>
        <button type="submit" class="btn btn-primary" style="width: 100%;">登入系統</button>
    </form>
    <p id="loginError" style="color: red; font-size: 14px; margin-top: 15px; display: none;">帳號或密碼錯誤！</p>
</div>

<!-- 主系統畫面 (預設隱藏) -->
<div class="container hidden" id="mainApp">
    
    <div class="header-section">
        <h1 onclick="goToHome()" title="點擊回到首頁">🌐 TVA管理系統</h1>
        <div class="user-controls">
            <span class="welcome-text" id="welcomeUserText"></span>
            <button id="manageUsersBtn" class="btn btn-info hidden" onclick="toggleUserManagement()">⚙️ 帳號管理</button>
            <button class="btn btn-secondary" onclick="handleLogout()">登出</button>
        </div>
    </div>
    
    <!-- 1. 新增/編輯資料表單 -->
    <div id="formSection" class="form-section">
        <h2 id="formTitle">➕ 新增維修/校正紀錄</h2>
        <form id="recordForm" onsubmit="handleFormSubmit(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="inputDate">日期</label>
                    <input type="date" id="inputDate" required>
                </div>
                <div class="form-group">
                    <label for="inputCustomer">客戶名稱</label>
                    <input type="text" id="inputCustomer" placeholder="例如：台積電" list="customerList" required>
                    <datalist id="customerList"></datalist>
                </div>
                <div class="form-group">
                    <label for="inputSerial">儀器序號</label>
                    <input type="text" id="inputSerial" placeholder="例如：SN-A1001" list="serialList" required>
                    <datalist id="serialList"></datalist>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label for="inputTask">維修/校正項目詳細說明</label>
                    <select id="inputTask" onchange="toggleCustomInput('inputTask', 'customTask')" required>
                        <option value="" disabled selected>請選擇項目...</option>
                        <option value="校正">1. 校正</option>
                        <option value="吸到水">2. 吸到水</option>
                        <option value="更換電池">3. 更換電池</option>
                        <option value="更換泵浦總成">4. 更換泵浦總成</option>
                        <option value="更換點火器">5. 更換點火器</option>
                        <option value="韌體更新">6. 韌體更新</option>
                        <option value="新機出貨">7. 新機出貨</option>
                        <option value="其他">8. 其他 (自行輸入)</option>
                    </select>
                    <input type="text" id="customTask" class="custom-input" placeholder="請手動輸入維修/校正項目...">
                </div>
                <div class="form-group">
                    <label for="inputEngineer">處理工程師</label>
                    <select id="inputEngineer" onchange="toggleCustomInput('inputEngineer', 'customEngineer')" required>
                        <option value="" disabled selected>請選擇工程師...</option>
                        <option value="Gary">1. Gary</option>
                        <option value="Krain">2. Krain</option>
                        <option value="其他">3. 其他 (自行輸入)</option>
                    </select>
                    <input type="text" id="customEngineer" class="custom-input" placeholder="請手動輸入工程師姓名...">
                </div>
                <div class="form-group">
                    <label for="inputStatus">案件狀態</label>
                    <select id="inputStatus">
                        <option value="✅ 完成">✅ 完成</option>
                        <option value="⏳ 待零件">⏳ 待零件</option>
                        <option value="⚠️ 檢修中">⚠️ 檢修中</option>
                    </select>
                </div>
            </div>
            <div class="form-grid" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label for="inputRemarks">備註</label>
                    <input type="text" id="inputRemarks" placeholder="選填備註事項...">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn btn-submit">儲存並同步至雲端</button>
                <button type="button" id="cancelEditBtn" class="btn btn-cancel" onclick="resetFormState()">取消編輯</button>
            </div>
        </form>
    </div>

    <!-- 2. 搜尋區塊 -->
    <div id="searchSection" class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="輸入「客戶名稱」或「儀器序號」進行搜尋..." oninput="searchRecords()">
        <button class="btn btn-primary" onclick="searchRecords()">🔍 搜尋</button>
        <button class="btn btn-secondary" onclick="resetSearch()">清除搜尋</button>
    </div>

    <!-- 3. 資料表格 -->
    <table id="recordsTable">
        <thead>
            <tr id="tableHeaderRow">
                <th class="sortable" onclick="handleSort('date')">日期 <span id="sort-date" class="sort-icon sort-active">⬇️</span></th>
                <th class="sortable" onclick="handleSort('customer')">客戶名稱 <span id="sort-customer" class="sort-icon">↕️</span></th>
                <th class="sortable" onclick="handleSort('serial')">儀器序號 <span id="sort-serial" class="sort-icon">↕️</span></th>
                <th>維修/校正項目</th>
                <th>處理工程師</th>
                <th>狀態</th>
                <th>備註</th>
                <!-- 操作欄位會透過權限動態生成 -->
            </tr>
        </thead>
        <tbody id="recordTableBody">
            <tr><td colspan="8" class="no-data">☁️ 雲端資料庫連線中...</td></tr>
        </tbody>
    </table>

    <div id="pagination" class="pagination"></div>

    <div id="statsFooter" class="footer-stats">
        目前此系統累積有 0 間客戶，0 台儀器
    </div>
</div>

<!-- 帳號管理畫面 (最高權限專用，預設隱藏) -->
<div class="container hidden" id="userManagementApp">
    <div class="header-section">
        <h2>⚙️ 系統帳號權限管理</h2>
        <button class="btn btn-secondary" onclick="goToHome()">返回系統首頁</button>
    </div>
    
    <div class="form-section">
        <h3>➕ 新增 / 編輯帳號</h3>
        <form onsubmit="handleUserSubmit(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label>登入帳號</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>登入密碼</label>
                    <input type="text" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>權限等級</label>
                    <select id="regRole" required>
                        <option value="1">1. 最高權限 (完全控制)</option>
                        <option value="2">2. 第二權限 (可新增/編輯)</option>
                        <option value="3">3. 第三權限 (僅可讀取)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-submit" id="userSubmitBtn">儲存帳號設定</button>
            <button type="button" class="btn btn-cancel" id="userCancelBtn" onclick="resetUserForm()" style="margin-top: 10px; width: 100%;">取消編輯</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>帳號名稱</th>
                <th>密碼</th>
                <th>權限等級</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- 帳號資料動態生成 -->
        </tbody>
    </table>
</div>

<!-- 引入 Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, where, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔴 ⚠️ 記得將這裡替換成你專屬的 Firebase 金鑰 ⚠️ 🔴
    const firebaseConfig = {
        apiKey: "AIzaSyBccKaB3yjh7anO2KhK2XsPiwnoEDYAss8",
  authDomain: "tva2020.firebaseapp.com",
  databaseURL: "https://tva2020-default-rtdb.firebaseio.com",
  projectId: "tva2020",
  storageBucket: "tva2020.firebasestorage.app",
  messagingSenderId: "309634484442",
  appId: "1:309634484442:web:d31941cfef811f73a63de3",
  measurementId: "G-ZSCF0Y3N5Z"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const recordsCol = collection(db, "instrument_records"); 
    const usersCol = collection(db, "users");

    let database = []; 
    let currentDisplayData = []; 
    let currentEditingId = null; 
    
    let usersDatabase = [];
    let currentUserEditingId = null;

    // 目前登入者的狀態 (null 表示未登入)
    let loggedInUser = null; 

    let currentPage = 1;
    const itemsPerPage = 10; 
    let currentSortColumn = 'date';
    let isDescending = true;

    // 🌟 系統初始化：檢查並自動建立最高權限帳號 Gary
    async function initSystemAuth() {
        const q = query(usersCol, where("username", "==", "Gary"));
        const snapshot = await getDocs(q);
        if (snapshot.empty) {
            // 如果沒找到 Gary，自動建立
            await setDoc(doc(usersCol, "admin_gary"), {
                username: "Gary",
                password: "20120326",
                role: 1
            });
            console.log("已自動建立最高權限帳號 Gary");
        }
    }
    initSystemAuth();

    // 🌟 登入功能
    async function handleLogin(event) {
        event.preventDefault();
        const user = document.getElementById("loginUsername").value.trim();
        const pass = document.getElementById("loginPassword").value.trim();
        
        const q = query(usersCol, where("username", "==", user), where("password", "==", pass));
        const snapshot = await getDocs(q);
        
        if (!snapshot.empty) {
            // 登入成功
            const userData = snapshot.docs[0].data();
            loggedInUser = { id: snapshot.docs[0].id, username: userData.username, role: Number(userData.role) };
            
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            document.getElementById("welcomeUserText").innerText = `👤 登入者：${loggedInUser.username} (權限 ${loggedInUser.role})`;
            document.getElementById("loginError").style.display = "none";
            
            applyPermissions(); // 套用權限畫面
            initDataListeners(); // 開始抓取資料
        } else {
            // 登入失敗
            document.getElementById("loginError").style.display = "block";
        }
    }

    // 🌟 登出功能
    function handleLogout() {
        loggedInUser = null;
        document.getElementById("mainApp").classList.add("hidden");
        document.getElementById("userManagementApp").classList.add("hidden");
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("loginUsername").value = "";
        document.getElementById("loginPassword").value = "";
    }

    // 🌟 權限控管邏輯
    function applyPermissions() {
        // 角色 1 (最高權限)：顯示帳號管理按鈕
        if (loggedInUser.role === 1) {
            document.getElementById("manageUsersBtn").classList.remove("hidden");
        } else {
            document.getElementById("manageUsersBtn").classList.add("hidden");
        }

        // 角色 3 (僅可讀取)：隱藏表單區塊
        if (loggedInUser.role === 3) {
            document.getElementById("formSection").classList.add("hidden");
        } else {
            document.getElementById("formSection").classList.remove("hidden");
        }

        // 動態處理表格的「操作」標題
        const headerRow = document.getElementById("tableHeaderRow");
        // 先移除可能舊的操作欄位
        if(document.getElementById("actionHeader")) document.getElementById("actionHeader").remove();
        
        if (loggedInUser.role !== 3) {
            const th = document.createElement("th");
            th.id = "actionHeader";
            th.style.minWidth = "90px";
            th.innerText = "操作";
            headerRow.appendChild(th);
        }
    }

    // 頁面切換邏輯
    function goToHome() {
        document.getElementById("userManagementApp").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
        resetFormState();
        currentPage = 1;
        renderTableAndPagination();
    }

    function toggleUserManagement() {
        document.getElementById("mainApp").classList.add("hidden");
        document.getElementById("userManagementApp").classList.remove("hidden");
    }

    // 資料庫監聽
    function initDataListeners() {
        // 監聽維修紀錄
        onSnapshot(recordsCol, (snapshot) => {
            database = [];
            snapshot.forEach((doc) => { database.push({ id: doc.id, ...doc.data() }); });
            searchRecords(); 
            updateStats(); 
            updateDatalists(); 
        });

        // 監聽使用者帳號 (僅最高權限需要)
        if (loggedInUser.role === 1) {
            onSnapshot(usersCol, (snapshot) => {
                usersDatabase = [];
                snapshot.forEach((doc) => { usersDatabase.push({ id: doc.id, ...doc.data() }); });
                renderUserTable();
            });
        }
    }

    // --- 以下為原有的維修紀錄功能 ---
    function updateDatalists() {
        const customerList = document.getElementById("customerList");
        const serialList = document.getElementById("serialList");
        const uniqueCustomers = [...new Set(database.map(record => record.customer))].filter(Boolean);
        const uniqueSerials = [...new Set(database.map(record => record.serial))].filter(Boolean);
        customerList.innerHTML = uniqueCustomers.map(c => `<option value="${c}">`).join("");
        serialList.innerHTML = uniqueSerials.map(s => `<option value="${s}">`).join("");
    }

    function updateStats() {
        const uniqueCustomers = new Set(database.map(record => record.customer)).size;
        const uniqueSerials = new Set(database.map(record => record.serial)).size;
        document.getElementById("statsFooter").innerText = `目前此系統累積有 ${uniqueCustomers} 間客戶，${uniqueSerials} 台儀器`;
    }

    function initFormDate() {
        if (currentEditingId) return; 
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById("inputDate").value = `${year}-${month}-${day}`;
    }

    function toggleCustomInput(selectId, customInputId) {
        const selectBox = document.getElementById(selectId);
        const customInput = document.getElementById(customInputId);
        if (selectBox.value === "其他") {
            customInput.style.display = "block";
            customInput.setAttribute("required", "true"); 
        } else {
            customInput.style.display = "none";
            customInput.removeAttribute("required");
            customInput.value = ""; 
        }
    }

    function handleSort(column) {
        if (currentSortColumn === column) {
            isDescending = !isDescending;
        } else {
            currentSortColumn = column;
            isDescending = (column === 'date') ? true : false;
        }
        updateSortIcons();
        currentPage = 1; 
        currentDisplayData = applySort(currentDisplayData);
        renderTableAndPagination();
    }

    function updateSortIcons() {
        ['date', 'customer', 'serial'].forEach(id => {
            const el = document.getElementById(`sort-${id}`);
            if (el) {
                if (id === currentSortColumn) {
                    el.innerText = isDescending ? "⬇️" : "⬆️";
                    el.classList.add("sort-active");
                } else {
                    el.innerText = "↕️";
                    el.classList.remove("sort-active");
                }
            }
        });
    }

    function applySort(dataArray) {
        return dataArray.sort((a, b) => {
            let valA = a[currentSortColumn] || "";
            let valB = b[currentSortColumn] || "";
            if (valA < valB) return isDescending ? 1 : -1;
            if (valA > valB) return isDescending ? -1 : 1;
            return 0;
        });
    }

    function renderTableAndPagination() {
        const tableBody = document.getElementById("recordTableBody");
        tableBody.innerHTML = "";
        
        if (currentDisplayData.length === 0) {
            const colSpan = loggedInUser && loggedInUser.role === 3 ? 7 : 8;
            tableBody.innerHTML = `<tr><td colspan="${colSpan}" class="no-data">📭 目前沒有符合條件的紀錄</td></tr>`;
            document.getElementById("pagination").innerHTML = ""; 
            return;
        }

        const totalPages = Math.ceil(currentDisplayData.length / itemsPerPage);
        if (currentPage > totalPages) currentPage = totalPages; 
        const startIndex = (currentPage - 1) * itemsPerPage;
        const paginatedData = currentDisplayData.slice(startIndex, startIndex + itemsPerPage);

        paginatedData.forEach(record => {
            const statusClass = record.status.includes("完成") ? "status-done" : "status-wait";
            
            // 權限判斷：第三權限看不到操作按鈕
            let actionHtml = '';
            if (loggedInUser && loggedInUser.role !== 3) {
                actionHtml = `<td>
                    <button class="btn btn-sm btn-edit" onclick="editRecord('${record.id}')">編輯</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRecord('${record.id}')">刪除</button>
                </td>`;
            }

            const row = `<tr>
                <td><strong>${record.date}</strong></td>
                <td><strong>${record.customer}</strong></td>
                <td><code>${record.serial}</code></td>
                <td>${record.task}</td>
                <td>${record.engineer}</td>
                <td><span class="status-badge ${statusClass}">${record.status}</span></td>
                <td><span style="color:#555; font-size:13px;">${record.remarks || ""}</span></td>
                ${actionHtml}
            </tr>`;
            tableBody.innerHTML += row;
        });

        renderPaginationButtons(totalPages);
    }

    function renderPaginationButtons(totalPages) {
        const paginationDiv = document.getElementById("pagination");
        paginationDiv.innerHTML = "";
        if (totalPages <= 1) return; 

        const prevBtn = document.createElement("button");
        prevBtn.innerText = "上一頁";
        prevBtn.className = "page-btn";
        prevBtn.disabled = (currentPage === 1);
        prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderTableAndPagination(); } };
        paginationDiv.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement("button");
            pageBtn.innerText = i;
            pageBtn.className = (i === currentPage) ? "page-btn active" : "page-btn";
            pageBtn.onclick = () => { currentPage = i; renderTableAndPagination(); };
            paginationDiv.appendChild(pageBtn);
        }

        const nextBtn = document.createElement("button");
        nextBtn.innerText = "下一頁";
        nextBtn.className = "page-btn";
        nextBtn.disabled = (currentPage === totalPages);
        nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderTableAndPagination(); } };
        paginationDiv.appendChild(nextBtn);
    }

    function editRecord(id) {
        const record = database.find(r => r.id === id);
        if (!record) return;

        currentEditingId = id; 
        document.getElementById("formSection").classList.add("edit-mode");
        document.getElementById("formTitle").innerText = "✏️ 編輯維修/校正紀錄";
        document.getElementById("submitBtn").innerText = "💾 更新並同步至雲端";
        document.getElementById("submitBtn").classList.add("edit-active");
        document.getElementById("cancelEditBtn").style.display = "block";

        document.getElementById("inputDate").value = record.date;
        document.getElementById("inputCustomer").value = record.customer;
        document.getElementById("inputSerial").value = record.serial;
        document.getElementById("inputStatus").value = record.status;
        document.getElementById("inputRemarks").value = record.remarks || "";

        const taskSelect = document.getElementById("inputTask");
        const customTaskInput = document.getElementById("customTask");
        const taskOptions = Array.from(taskSelect.options).map(opt => opt.value);
        if (taskOptions.includes(record.task)) {
            taskSelect.value = record.task;
            customTaskInput.style.display = "none";
        } else {
            taskSelect.value = "其他";
            customTaskInput.style.display = "block";
            customTaskInput.value = record.task; 
        }

        const engSelect = document.getElementById("inputEngineer");
        const customEngInput = document.getElementById("customEngineer");
        const engOptions = Array.from(engSelect.options).map(opt => opt.value);
        if (engOptions.includes(record.engineer)) {
            engSelect.value = record.engineer;
            customEngInput.style.display = "none";
        } else {
            engSelect.value = "其他";
            customEngInput.style.display = "block";
            customEngInput.value = record.engineer;
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFormState() {
        currentEditingId = null;
        document.getElementById("recordForm").reset();
        document.getElementById("formSection").classList.remove("edit-mode");
        document.getElementById("formTitle").innerText = "➕ 新增維修/校正紀錄";
        document.getElementById("submitBtn").innerText = "儲存並同步至雲端";
        document.getElementById("submitBtn").classList.remove("edit-active");
        document.getElementById("cancelEditBtn").style.display = "none";
        document.getElementById("customTask").style.display = "none";
        document.getElementById("customEngineer").style.display = "none";
        initFormDate(); 
    }

    async function handleFormSubmit(event) {
        event.preventDefault();
        let finalTask = document.getElementById("inputTask").value;
        if (finalTask === "其他") finalTask = document.getElementById("customTask").value.trim();
        let finalEngineer = document.getElementById("inputEngineer").value;
        if (finalEngineer === "其他") finalEngineer = document.getElementById("customEngineer").value.trim();

        const recordData = {
            date: document.getElementById("inputDate").value,
            customer: document.getElementById("inputCustomer").value.trim(),
            serial: document.getElementById("inputSerial").value.trim(),
            task: finalTask,
            engineer: finalEngineer,
            status: document.getElementById("inputStatus").value,
            remarks: document.getElementById("inputRemarks").value.trim()
        };

        try {
            if (currentEditingId) {
                await updateDoc(doc(db, "instrument_records", currentEditingId), recordData);
                alert("✅ 紀錄更新成功！");
            } else {
                await addDoc(recordsCol, recordData); 
                alert("🎉 資料已成功同步至雲端！");
                currentPage = 1;
            }
            resetFormState(); 
        } catch (e) { alert("❌ 儲存失敗，請檢查網路狀態：" + e); }
    }

    async function deleteRecord(id) {
        if (confirm("⚠️ 確定要刪除這筆紀錄嗎？確認後無法復原。")) {
            try { await deleteDoc(doc(db, "instrument_records", id)); } 
            catch (e) { alert("❌ 刪除失敗：" + e); }
        }
    }

    function searchRecords() {
        const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
        if (keyword !== "") {
            currentDisplayData = database.filter(record => 
                (record.customer && record.customer.toLowerCase().includes(keyword)) || 
                (record.serial && record.serial.toLowerCase().includes(keyword))
            );
        } else {
            currentDisplayData = [...database];
        }
        currentPage = 1;
        currentDisplayData = applySort(currentDisplayData);
        renderTableAndPagination();
    }

    function resetSearch() {
        document.getElementById("searchInput").value = "";
        searchRecords();
    }


    // --- 以下為帳號管理專區功能 (最高權限) ---
    function renderUserTable() {
        const tbody = document.getElementById("userTableBody");
        tbody.innerHTML = "";
        
        usersDatabase.forEach(user => {
            let roleText = "";
            if(user.role === 1) roleText = "1. 最高權限";
            if(user.role === 2) roleText = "2. 第二權限";
            if(user.role === 3) roleText = "3. 第三權限";

            // 防止自己刪除自己
            let deleteBtn = `<button class="btn btn-sm btn-danger" onclick="deleteUser('${user.id}')">刪除</button>`;
            if (user.username === loggedInUser.username) {
                deleteBtn = `<span style="color:#95a5a6; font-size:12px;">無法刪除自己</span>`;
            }

            const row = `<tr>
                <td><strong>${user.username}</strong></td>
                <td><code>${user.password}</code></td>
                <td>${roleText}</td>
                <td>
                    <button class="btn btn-sm btn-edit" onclick="editUser('${user.id}')">編輯</button>
                    ${deleteBtn}
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    async function handleUserSubmit(event) {
        event.preventDefault();
        const userData = {
            username: document.getElementById("regUsername").value.trim(),
            password: document.getElementById("regPassword").value.trim(),
            role: Number(document.getElementById("regRole").value)
        };

        try {
            if (currentUserEditingId) {
                await updateDoc(doc(db, "users", currentUserEditingId), userData);
                alert("✅ 帳號更新成功！");
            } else {
                // 檢查帳號是否重複
                const q = query(usersCol, where("username", "==", userData.username));
                const snapshot = await getDocs(q);
                if(!snapshot.empty){
                    alert("❌ 此帳號名稱已被使用，請換一個！");
                    return;
                }
                await addDoc(usersCol, userData);
                alert("🎉 新帳號建立成功！");
            }
            resetUserForm();
        } catch (e) { alert("❌ 操作失敗：" + e); }
    }

    function editUser(id) {
        const user = usersDatabase.find(u => u.id === id);
        if(!user) return;
        currentUserEditingId = id;
        document.getElementById("regUsername").value = user.username;
        document.getElementById("regPassword").value = user.password;
        document.getElementById("regRole").value = user.role;
        document.getElementById("userSubmitBtn").innerText = "💾 更新帳號資料";
        document.getElementById("userSubmitBtn").classList.add("edit-active");
        document.getElementById("userCancelBtn").style.display = "block";
    }

    function resetUserForm() {
        currentUserEditingId = null;
        document.getElementById("regUsername").value = "";
        document.getElementById("regPassword").value = "";
        document.getElementById("regRole").value = "1";
        document.getElementById("userSubmitBtn").innerText = "儲存帳號設定";
        document.getElementById("userSubmitBtn").classList.remove("edit-active");
        document.getElementById("userCancelBtn").style.display = "none";
    }

    async function deleteUser(id) {
        if (confirm("⚠️ 確定要刪除此帳號嗎？")) {
            try { await deleteDoc(doc(db, "users", id)); } 
            catch (e) { alert("❌ 刪除失敗：" + e); }
        }
    }


    // 綁定全域函式供 HTML onclick 使用
    window.handleLogin = handleLogin;
    window.handleLogout = handleLogout;
    window.goToHome = goToHome;
    window.toggleUserManagement = toggleUserManagement;
    
    window.handleFormSubmit = handleFormSubmit;
    window.deleteRecord = deleteRecord;
    window.editRecord = editRecord;
    window.resetFormState = resetFormState;
    window.handleSort = handleSort;
    window.searchRecords = searchRecords;
    window.resetSearch = resetSearch;
    window.toggleCustomInput = toggleCustomInput;

    window.handleUserSubmit = handleUserSubmit;
    window.editUser = editUser;
    window.deleteUser = deleteUser;
    window.resetUserForm = resetUserForm;

    initFormDate();
</script>
</body>
</html>
